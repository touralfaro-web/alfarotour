    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* --- NAVEGACIÓN --- */
    nav {

    }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-img {
      width: 45px; height: 45px; border-radius: 50%;
      background: linear-gradient(135deg, var(--dorado), var(--dorado-lt));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; color: var(--verde);
      font-weight: 900; font-size: 1.2rem; border: 2px solid #fff;
    }
    .logo-name { font-family: 'Playfair Display', serif; color: #fff; font-size: 1.3rem; font-weight: 700; line-height: 1; }
    .logo-tag { font-size: .65rem; color: var(--dorado-lt); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; margin-top: 2px; }
    
    .nav-links { display: flex; gap: 10px; align-items: center; }
    .nav-links a {
      color: #fff; text-decoration: none; padding: 10px 16px;
      font-size: .85rem; font-weight: 700; transition: .3s; border-radius: 30px;
    }
    .nav-links a:hover { background: rgba(255,255,255,.1); color: var(--dorado-lt); }
    .nav-wa { background: var(--wa); color: #fff!important; box-shadow: 0 4px 12px rgba(37,211,102,.3); }

    }
    .hero-bg {
      position: absolute; inset: 0;
      background: url('hero_panama.png') center/cover no-repeat;
      z-index: -1; transform: scale(1.05);
    }
    .hero-ov { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,.3), rgba(27,67,50,.7)); z-index: -1; }

      margin-bottom: 25px; animation: fadeInDown 1s ease;
    }

    }
